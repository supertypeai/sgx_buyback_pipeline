name: Track SGX Shareholders

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Scrape SGX Filings"]
    types: [completed]

concurrency:
  group: sgx-track-shareholders
  cancel-in-progress: false

jobs:
  track:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv (Python package manager)
        uses: astral-sh/setup-uv@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          uv sync

      - name: Run shareholder tracking
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          uv run python -m sgx_scraper.main_cli track_shareholders

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sgx-track-shareholders-artifacts
          path: |
            scraper.log
          if-no-files-found: warn
          retention-days: 90