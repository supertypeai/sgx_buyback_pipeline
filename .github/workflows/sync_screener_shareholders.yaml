name: Sync SGX Screener Shareholders

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 1 * *'  # Runs at 10:00 AM WIB (UTC+7), 1st of every month

concurrency:
  group: sgx-sync-screener-shareholders
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv (Python package manager)
        uses: astral-sh/setup-uv@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          uv sync

      - name: Run screener sync
        env:
          PROXY: ${{ secrets.PROXY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          uv run python -m sgx_scraper.main_cli sync_screener_shareholders

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sgx-sync-screener-shareholders-artifacts
          path: |
            scraper.log
          if-no-files-found: warn
          retention-days: 90

      - name: Pull latest changes
        run: |
          git fetch origin main
          git stash push -m "temp-shareholders-log" || true
          git merge origin/main --strategy-option=theirs || true
          git stash pop || true

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git diff-index --quiet HEAD || (git commit -m "sgx_shareholders: track shareholders payload" --allow-empty)
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}